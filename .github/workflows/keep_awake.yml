name: Wake Up All Apps

on:
  schedule:
    - cron: '0 * * * *' # 매 시간 정각 실행
  workflow_dispatch:

jobs:
  ping_apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Setup Python & Install Dependencies
        run: uv pip install --system -r pyproject.toml
        
      # sc 폴더로 이동한 뒤 봇을 실행합니다.
      - name: Run Headless Browser Script
        run: |
          cd sc
          python keep_awake_bot.py