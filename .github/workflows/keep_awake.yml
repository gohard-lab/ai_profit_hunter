name: Wake Up All Apps

on:
  schedule:
    - cron: '0 * * * *' # 매 시간 정각에 실행
  workflow_dispatch:

jobs:
  ping_apps:
    runs-on: ubuntu-latest
    env:
      # Node.js 20 경고 해결을 위한 환경 변수 추가
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Setup Python & Install Dependencies
        run: |
          # 1. 시스템 영역 대신 우리만의 독립된 가상 환경을 만듭니다.
          uv venv
          # 2. --system 옵션을 빼고 가상 환경 안에 안전하게 패키지를 설치합니다.
          uv pip install -r pyproject.toml
        
      - name: Run Headless Browser Script
        run: |
          echo "src 폴더로 이동:"
          cd src
          
          # 3. uv run 명령어를 사용하면 가상 환경의 파이썬으로 알아서 봇을 실행해 줍니다.
          uv run keep_awake_bot.py